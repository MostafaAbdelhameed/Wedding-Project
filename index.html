<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mostafa ❤️ Noor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,#fff7fa,#ffeef5);
overflow-x:hidden;
color:#333;
}

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.55);
}

.overlay{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
color:white;
}

.names{
font-family:Pacifico;
font-size:85px;
}

.tag{
margin-top:20px;
padding:15px 30px;
border-radius:999px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
font-size:24px;
}

.desc{
margin-top:30px;
font-size:24px;
max-width:800px;
line-height:1.8;
}

.section{
padding:80px 20px;
text-align:center;
}

.gameTitle{
font-size:50px;
margin-bottom:20px;
}

.sub{
font-size:22px;
color:#666;
margin-bottom:20px;
}

.progress-wrap{
width:800px;
max-width:90%;
margin:auto;
}

.progress-bar{
height:22px;
background:#ece3e7;
border-radius:999px;
overflow:hidden;
}

#progress{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#ff6f91,
#ffb5c8
);
transition:.3s;
}

#funnyLine{
margin-top:20px;
font-size:22px;
height:40px;
}

#game{
width:95vw;
max-width:1100px;
height:700px;
background:white;
border-radius:40px;
box-shadow:0 20px 60px rgba(0,0,0,.12);
}

.card{
max-width:900px;
margin:auto;
padding:30px;
background:white;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

iframe{
width:100%;
height:450px;
border:none;
border-radius:25px;
}

textarea{
width:100%;
height:130px;
padding:20px;
border-radius:20px;
border:2px solid #eee;
resize:none;
margin-bottom:20px;
font-size:18px;
}

.btn{
padding:15px 35px;
background:#ff5b92;
border:none;
border-radius:999px;
color:white;
font-size:20px;
cursor:pointer;
text-decoration:none;
}

.comment{
padding:15px;
background:#fff4f8;
border-radius:20px;
margin-top:15px;
text-align:left;
}

.win{
display:none;
position:fixed;
inset:0;
background:rgba(255,255,255,.92);
backdrop-filter:blur(10px);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transition:opacity .8s;
pointer-events:none;
}

.win.show{
display:flex;
opacity:1;
pointer-events:auto;
}

.win.hide{
opacity:0;
pointer-events:none;
}

.win h1{
font-size:90px;
color:#ff4d85;
animation:bounce .7s infinite alternate;
}

.continueBtn{
margin-top:25px;
padding:16px 35px;
border:none;
border-radius:999px;
background:#ff5b92;
color:white;
font-size:22px;
cursor:pointer;
}

.floatHeart{
position:fixed;
font-size:40px;
pointer-events:none;
animation:fly 4s linear forwards;
z-index:99999;
}

@keyframes fly{
0%{
opacity:1;
transform:translateY(0) scale(.5);
}
100%{
opacity:0;
transform:translateY(-400px) scale(2);
}
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-20px)}
}

</style>
</head>
<body>


<section class="hero">

<img src="couple.jpg">

<div class="overlay">

<div class="names">
Noor ❤️ Mostafa
</div>

<div class="tag">
We're getting married 
</div>

<div class="desc">
Help Noor escape... Mostafa activated wedding mode 😂💍
</div>

</div>

</section>


<section class="section">

<h2 class="gameTitle">
🏃 Catch Noor If You Can
</h2>

<p class="sub">
Move your mouse to help Noor escape 😭
</p>

<div class="progress-wrap">

<div class="progress-bar">
<div id="progress"></div>
</div>

<div id="funnyLine">
Move mouse to start 👀
</div>

</div>

<canvas id="game"></canvas>

</section>


<section class="section">

<h2 class="gameTitle">
📍 Find Us
</h2>

<div class="card">

<iframe
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d340.8932616671514!2d31.6902919991898!3d26.572019529458665!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x144f5f367bc75e33%3A0x969fbaa1f416fa29!2z2YLYp9i52Kkg2KfZhNmC2LXYsSDZhNmE2KfZgdix2KfYrQ!5e1!3m2!1sar!2seg!4v1778940697041!5m2!1sar!2seg"">
</iframe>

</div>

</section>


<section class="section">

<h2 class="gameTitle">
💌 Leave us a message
</h2>

<div class="card">

<textarea
id="message"
placeholder="Advice... jokes... roast Mostafa 😂">
</textarea>

<button
class="btn"
onclick="saveComment()">
Send 💌
</button>

<div id="comments"></div>

</div>

</section>


<div class="win" id="win">

<h1>
YAAAAY 🎉
</h1>

<h2>
Mostafa caught Noor ❤️
</h2>

<p>
You're invited to our wedding!
</p>

<button
class="continueBtn"
onclick="closeWin()">
Continue ↓
</button>

</div>



<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1200
canvas.height=700

const mostafaImg=new Image()
mostafaImg.src="mostafa.png"

const noorImg=new Image()
noorImg.src="noor.png"

let started=false

let noor={x:950,y:350}
let mostafa={x:180,y:350}

let traps=[]

const funny=[

'Mostafa: "Noor wait 😭"',
'"Wedding mode activated 💍"',
'"Running won’t help 👀"',
'"Come back 😏"',
'"Noor.exe escaping..."'

]

function drawCharacter(img,x,y,size,color){

ctx.beginPath()
ctx.arc(x,y,size/2+10,0,6.2)
ctx.fillStyle=color
ctx.fill()

ctx.save()

ctx.beginPath()
ctx.arc(x,y,size/2,0,6.2)
ctx.clip()

ctx.drawImage(
img,
x-size/2,
y-size/2,
size,
size
)

ctx.restore()

ctx.beginPath()
ctx.arc(x,y,size/2,0,6.2)
ctx.strokeStyle="white"
ctx.lineWidth=5
ctx.stroke()

}

function pointerMove(x,y){

if(!started)return

const rect=canvas.getBoundingClientRect()

let nx=(x-rect.left)*(canvas.width/rect.width)
let ny=(y-rect.top)*(canvas.height/rect.height)

for(let t of traps){

let d=Math.hypot(nx-t.x,ny-t.y)

if(d<90)return

}

noor.x=nx
noor.y=ny

}

canvas.addEventListener(
"mousemove",
e=>pointerMove(
e.clientX,
e.clientY
))

function spawnTrap(){

if(traps.length>35)return

traps.push({
x:Math.random()*1000+100,
y:Math.random()*500+100,
rotation:Math.random()*360
})

}

function drawRing(t){

ctx.save()

ctx.translate(t.x,t.y)

ctx.rotate(
t.rotation*Math.PI/180
)

ctx.beginPath()
ctx.arc(0,0,28,0,6.2)
ctx.lineWidth=10
ctx.strokeStyle="#d4af37"
ctx.stroke()

ctx.beginPath()
ctx.moveTo(0,-38)
ctx.lineTo(-10,-20)
ctx.lineTo(0,-10)
ctx.lineTo(10,-20)
ctx.closePath()

ctx.fillStyle="#8be4ff"
ctx.fill()

ctx.restore()

}

function brokenHeart(){

let h=document.createElement("div")
h.innerHTML="💔"
h.className="floatHeart"

h.style.left=
Math.random()*100+"vw"

h.style.top="70vh"

document.body.appendChild(h)

setTimeout(()=>{
h.remove()
},4000)

}

function happyHeart(){

let h=document.createElement("div")
h.innerHTML="❤️"
h.className="floatHeart"

h.style.left=
Math.random()*100+"vw"

h.style.top="70vh"

document.body.appendChild(h)

setTimeout(()=>{
h.remove()
},4000)

}

function draw(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
)

traps.forEach(drawRing)

drawCharacter(
mostafaImg,
mostafa.x,
mostafa.y,
100,
"rgba(100,150,255,.4)"
)

drawCharacter(
noorImg,
noor.x,
noor.y,
100,
"rgba(255,130,180,.4)"
)

if(!started){

ctx.fillStyle="rgba(0,0,0,.45)"
ctx.fillRect(
0,0,
canvas.width,
canvas.height
)

ctx.fillStyle="white"
ctx.textAlign="center"
ctx.font="bold 60px Poppins"

ctx.fillText(
"Move mouse to start 😄",
canvas.width/2,
canvas.height/2
)

}

}

function update(){

traps.forEach(t=>{
t.rotation+=1
})

if(Math.random()<.01){
spawnTrap()
}

if(Math.random()<.02){
brokenHeart()
}

let dx=
noor.x-mostafa.x

let dy=
noor.y-mostafa.y

mostafa.x+=dx*.009
mostafa.y+=dy*.009

let d=Math.hypot(
mostafa.x-noor.x,
mostafa.y-noor.y
)

progress.style.width=
Math.max(0,
100-d/10
)+"%"

funnyLine.innerText=
funny[
Math.floor(
Math.random()*
funny.length
)]

if(d<80){
win()
return
}

draw()

requestAnimationFrame(
update)

}

function startGame(){

if(started)return

started=true
update()

}

canvas.addEventListener(
"mouseenter",
startGame
)

function win(){

const popup=
document.getElementById("win")

popup.classList.add(
"show"
)

for(let i=0;i<60;i++){

happyHeart()

setTimeout(()=>{

confetti({

particleCount:20,
spread:360,
origin:{
x:Math.random(),
y:Math.random()
}

})

},i*70)

}

setTimeout(()=>{
closeWin()
},4000)

}

function closeWin(){

const popup=
document.getElementById("win")

popup.classList.remove("show")
popup.classList.add("hide")

setTimeout(()=>{
popup.style.display="none"
},800)

}

function saveComment(){

let val=
message.value

if(!val)return

let data=
JSON.parse(
localStorage.getItem(
"weddingComments"
)||"[]"
)

data.push(val)

localStorage.setItem(
"weddingComments",
JSON.stringify(data)
)

message.value=""
loadComments()

}

function loadComments(){

let data=
JSON.parse(
localStorage.getItem(
"weddingComments"
)||"[]"
)

comments.innerHTML=""

data.forEach(c=>{

comments.innerHTML+=
`<div class="comment">
💖 ${c}
</div>`

})

}

loadComments()
draw()

</script>

</body>
</html>
