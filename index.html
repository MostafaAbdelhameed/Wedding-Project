<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Noor ❤️ Mostafa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(
180deg,
#fff7fa,
#ffeef5
);
overflow-x:hidden;
color:#333;
}

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;

filter:
brightness(.55)
blur(2px);

transform:
scale(1.05);

}

.overlay{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

text-align:center;
padding:20px;
color:white;
}

.names{
font-family:Pacifico;
font-size:85px;
}

.tag{
margin-top:20px;
padding:15px 30px;
border-radius:999px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
font-size:24px;
}

.desc{
margin-top:30px;
font-size:24px;
max-width:700px;
line-height:1.8;
}

.section{
padding:70px 20px;
text-align:center;
}

.gameTitle{
font-size:50px;
margin-bottom:30px;
}

.progress-wrap{
width:800px;
max-width:95%;
margin:auto;
margin-bottom:20px;
}

.progress-bar{
height:22px;
background:#ece3e7;
border-radius:999px;
overflow:hidden;
}

#progress{
height:100%;
width:0%;
background:linear-gradient(
90deg,
#ff6f91,
#ffb5c8
);
}

#game{
width:95vw;
max-width:1100px;
height:650px;
background:white;
border-radius:40px;
box-shadow:
0 20px 60px rgba(0,0,0,.12);

touch-action:none;
}

.card{
max-width:900px;
margin:auto;
padding:30px;
background:white;
border-radius:30px;
box-shadow:
0 15px 40px rgba(0,0,0,.08);
}

iframe{
width:100%;
height:450px;
border:none;
border-radius:25px;
}

.btn{
padding:15px 35px;
border:none;
border-radius:999px;
background:#ff5b92;
color:white;
cursor:pointer;
font-size:20px;
text-decoration:none;
}

.musicBtn{

position:fixed;

bottom:20px;
right:20px;

width:70px;
height:70px;

border:none;
border-radius:50%;

background:#ff5b92;
color:white;

font-size:25px;

z-index:999;

cursor:pointer;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}

textarea{
width:100%;
height:130px;
padding:20px;
border-radius:20px;
border:2px solid #eee;
font-size:18px;
resize:none;
margin-bottom:20px;
}

.comment{
padding:15px;
background:#fff4f8;
border-radius:20px;
margin-top:15px;
text-align:left;
}

.win{
display:none;
position:fixed;
inset:0;
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);

z-index:9999;

justify-content:center;
align-items:center;
flex-direction:column;

}

.win.show{
display:flex;
}

@media(max-width:768px){

.names{
font-size:50px;
}

.desc{
font-size:18px;
}

.gameTitle{
font-size:35px;
}

#game{
height:420px;
}

iframe{
height:300px;
}

}

</style>
</head>
<body>


    <audio
    id="music"
    autoplay
    loop>
    
    <source
    src="song.mp3"
    type="audio/mpeg">
    
    </audio>

<button
class="musicBtn"
id="musicBtn"
onclick="toggleMusic()">

▶️

</button>



<section class="hero">

<img src="couple.jpg">

<div class="overlay">

<div class="names">

Mostafa ❤️ Noor

</div>

<div class="tag">

we're getting married

</div>

<div class="desc">

    💍 Welcome to our wedding adventure

    <br><br>
    
    📅 09/09/2026  
    🕕 6:00 PM — Monday

</div>

</div>

</section>



<section class="section">

<h2 class="gameTitle">

🏃 Catch Noor If You Can

</h2>

<div class="progress-wrap">

<div class="progress-bar">

<div id="progress"></div>

</div>

</div>

<canvas id="game"></canvas>

</section>




<section class="section">

<h2 class="gameTitle">

📍 Find Us

</h2>

<div class="card">

<iframe
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d340.8932616671514!2d31.6902919991898!3d26.572019529458665!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x144f5f367bc75e33%3A0x969fbaa1f416fa29!2z2YLYp9i52Kkg2KfZhNmC2LXYsSDZhNmE2KfZgdix2KfYrQ!5e1!3m2!1sar!2seg!4v1778940697041!5m2!1sar!2seg""
loading="lazy"
allowfullscreen>
</iframe>

</div>

</section>




<section class="section">

<h2 class="gameTitle">

💌 Leave us a message

</h2>

<div class="card">

<textarea
id="message"
placeholder=
"Advice... jokes... roast Mostafa 😂">
</textarea>

<button
class="btn"
onclick="saveComment()">

Send 💌

</button>

<div id="comments"></div>

</div>

</section>



<div
class="win"
id="win">

<h1>

YAAAAY 🎉

</h1>

<h2>

Mostafa caught Noor ❤️

</h2>

<p>

You're invited to our wedding!

</p>

<button
class="btn"
onclick="closeWin()">

Continue ↓

</button>

</div>



<script>

const canvas=
document.getElementById("game")

const ctx=
canvas.getContext("2d")

canvas.width=1200
canvas.height=650


const mostafaImg=
new Image()

mostafaImg.src=
"mostafa.png"

const noorImg=
new Image()

noorImg.src=
"noor.png"



let started=false

let noor={x:950,y:350}
let mostafa={x:180,y:350}

let traps=[]



function pointerMove(x,y){

if(!started)return

const rect=
canvas.getBoundingClientRect()

let nx=
(x-rect.left)
*
(canvas.width/rect.width)

let ny=
(y-rect.top)
*
(canvas.height/rect.height)


for(let t of traps){

if(
Math.hypot(
nx-t.x,
ny-t.y
)<90
)return

}

noor.x=nx
noor.y=ny

}


canvas.addEventListener(
"mousemove",
e=>{

pointerMove(
e.clientX,
e.clientY
)

})



canvas.addEventListener(
"touchmove",
e=>{

e.preventDefault()

pointerMove(

e.touches[0].clientX,

e.touches[0].clientY

)

},
{
passive:false
}
)



function drawCharacter(
img,
x,
y,
size,
color
){

ctx.beginPath()

ctx.arc(
x,
y,
size/2+10,
0,
6.2
)

ctx.fillStyle=
color

ctx.fill()

ctx.save()

ctx.beginPath()

ctx.arc(
x,
y,
size/2,
0,
6.2
)

ctx.clip()


ctx.drawImage(

img,

x-size/2,
y-size/2,

size,
size

)

ctx.restore()

ctx.beginPath()

ctx.arc(
x,
y,
size/2,
0,
6.2
)

ctx.strokeStyle=
"white"

ctx.lineWidth=5

ctx.stroke()

}



function drawRing(t){

ctx.save()

ctx.translate(
t.x,
t.y
)

ctx.rotate(
t.rotation*
Math.PI/180
)

ctx.beginPath()

ctx.arc(
0,
0,
28,
0,
6.2
)

ctx.lineWidth=10

ctx.strokeStyle=
"#d4af37"

ctx.stroke()

ctx.beginPath()

ctx.moveTo(0,-38)

ctx.lineTo(-10,-20)

ctx.lineTo(0,-10)

ctx.lineTo(10,-20)

ctx.closePath()

ctx.fillStyle="#8be4ff"

ctx.fill()

ctx.restore()

}



function spawnTrap(){

if(
traps.length>35
)return


traps.push({

x:
Math.random()*1000+100,

y:
Math.random()*500+100,

rotation:
Math.random()*360

})

}



function draw(){

ctx.clearRect(
0,0,
canvas.width,
canvas.height
)

traps.forEach(drawRing)

drawCharacter(
mostafaImg,
mostafa.x,
mostafa.y,
100,
"rgba(100,150,255,.4)"
)

drawCharacter(
noorImg,
noor.x,
noor.y,
100,
"rgba(255,130,180,.4)"
)

if(!started){

ctx.fillStyle=
"rgba(0,0,0,.4)"

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
)

ctx.fillStyle=
"white"

ctx.textAlign=
"center"

ctx.font=
"bold 55px Arial"

ctx.fillText(

"Touch / Hover To Start 😄",

canvas.width/2,

canvas.height/2

)

}

}



function update(){

traps.forEach(
t=>t.rotation++
)

if(
Math.random()<.01
){
spawnTrap()
}

let dx=
noor.x-mostafa.x

let dy=
noor.y-mostafa.y

mostafa.x+=dx*.009
mostafa.y+=dy*.009

let d=

Math.hypot(
mostafa.x-noor.x,
mostafa.y-noor.y
)

progress.style.width=
Math.max(
0,
100-d/10
)+"%"


if(d<80){

win()
return

}

draw()

requestAnimationFrame(
update)

}



function startGame(){

if(started)
return

started=true

update()

}

canvas.addEventListener(
"mouseenter",
startGame
)

canvas.addEventListener(
"touchstart",
startGame
)



function toggleMusic(){

const music=
document.getElementById("music")

const btn=
document.getElementById("musicBtn")

if(music.paused){

music.play()

btn.innerHTML="⏸️"

}else{

music.pause()

btn.innerHTML="▶️"

}

}



function saveComment(){

let val=
message.value

if(!val)return

let data=

JSON.parse(

localStorage.getItem(
"weddingComments"
)

||"[]"

)

data.push(val)

localStorage.setItem(
"weddingComments",
JSON.stringify(data)
)

message.value=""

const music=
document.getElementById(
"music"
)

const btn=
document.getElementById(
"musicBtn"
)

function startMusicOnce(){

music.play()
.catch(()=>{})

btn.innerHTML="⏸️"

document.removeEventListener(
"click",
startMusicOnce
)

document.removeEventListener(
"touchstart",
startMusicOnce
)

}


// first interaction anywhere on page

document.addEventListener(
"click",
startMusicOnce
)

document.addEventListener(
"touchstart",
startMusicOnce
)

loadComments()

}



function loadComments(){

let data=

JSON.parse(
localStorage.getItem(
"weddingComments"
)
||"[]"
)

comments.innerHTML=""

data.forEach(c=>{

comments.innerHTML+=

`<div class='comment'>
💖 ${c}
</div>`

})

}



function win(){

document
.getElementById(
"win"
)
.classList.add(
"show"
)

confetti({
particleCount:300,
spread:360
})

}



function closeWin(){

document
.getElementById(
"win"
)
.style.display=
"none"

}

loadComments()

draw()

</script>

</body>
</html>
